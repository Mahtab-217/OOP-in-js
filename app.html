<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Display</title>
    <script src="app.js" defer></script>
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
     <div class="w-full max-w-5xl h-screen mx-auto p-4 grid grid-cols-3  grid-rows-2 gap-5 "> 
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl  row-span-1 col-span-3"></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl "></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl "></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl "></div>
     </div>
</body>
</html>
