<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Display</title>
    <script src="app.js" defer></script>
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
     <div class="w-full max-w-5xl h-screen mx-auto p-4 grid grid-cols-3 justify-evenly grid-rows-2 gap-5 "> 
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px] "></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px]"></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px]"></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px]"></div>
        <div class="w-52 h-52 border rounded-full bg-red-700/80  hover:translate-x-4 transition-[500px] "></div>
        <div class="w-52 h-52 border  bg-blue-800/80  hover:translate-x-4 transition-[500px]"></div>
       
     </div>
     <div class="h-screen w-full relative justify-center align-center">
         <div class=" h-52 w-52 border absolute  hover:translate-x-4 transition-[500px]"></div>
     </div>
     <div class="w-full max-w-5xl h-screen mx-auto p-4 grid grid-cols-3 justify-evenly grid-rows-2 gap-5 "> 
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px] "></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px]"></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px]"></div>
        <div class="border even:rounded-t-3xl odd:bg-purple-900/80 odd:rounded-b-3xl w-52 h-52 even:hover:bg-stone-100 odd:hover:bg-purple-900/70 hover:translate-x-4 transition-[500px]"></div>
        <div class="w-52 h-52 border rounded-full bg-red-700/80  hover:translate-x-4 transition-[500px] "></div>
        <div class="w-52 h-52 border  bg-blue-800/80  hover:translate-x-4 transition-[500px]"></div>
       
     </div>
     <div class="h-screen w-full relative justify-center align-center">
         <div class=" h-52 w-52 border absolute  hover:translate-x-4 transition-[500px]"></div>
     </div>
</body>
</html>
